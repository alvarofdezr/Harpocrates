name: Harpocrates Security Pipeline

on: [push, pull_request]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .
        pip install bandit pip-audit mypy black flake8 types-requests
        
    - name: Format Check (Black)
      run: black --check --target-version py310 core/ app/
      
    - name: Lint (Flake8)
      run: flake8 core/ app/ --max-line-length=120
      
    - name: Type Check (Mypy)
      run: mypy --strict core/ app/
        
    - name: Run Unit Tests
      run: python -m unittest discover tests
      
    - name: Security Scan (Bandit)
      run: bandit -r core/ app/ -f screen

    - name: Dependency Vulnerability Scan (pip-audit)
      run: pip-audit
      continue-on-error: true